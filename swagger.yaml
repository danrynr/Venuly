openapi: 3.0.0
info:
  title: Venuly API
  version: 1.0.0
  description: Event Management Platform API

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Meta:
      type: object
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: success
        message:
          type: string
          example: OK

    ApiResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          description: Payload — shape depends on the endpoint

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    EventType:
      type: string
      enum: [CONFERENCE, WORKSHOP, MEETUP, CONCERT, FESTIVAL]

    OrderStatus:
      type: string
      enum:
        - WAITING_FOR_PAYMENT
        - WAITING_FOR_ADMIN_CONFIRMATION
        - DONE
        - CANCELED
        - REJECTED
        - EXPIRED

tags:
  - name: Auth
  - name: Profile
  - name: Event
  - name: Order
  - name: Review
  - name: Dashboard

paths:
  # ─── Auth ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, verify_password, first_name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                verify_password:
                  type: string
                  minLength: 6
                first_name:
                  type: string
                last_name:
                  type: string
                referral:
                  type: string
                  description: 9-character referral code (optional)
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation error or passwords do not match
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive access + refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '403':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '400':
          description: Refresh token is required
        '401':
          description: Unauthorized

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Current password incorrect or validation error
        '401':
          description: Unauthorized

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password reset link to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset link sent (intentionally vague for security)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  # ─── Profile ─────────────────────────────────────────────────────────────────

  /profile/organizer/{id}:
    get:
      tags: [Profile]
      summary: Get public organizer profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Organizer profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Organizer not found

  /profile/detail:
    get:
      tags: [Profile]
      summary: Get authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized

  /profile/update:
    patch:
      tags: [Profile]
      summary: Update authenticated user's profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                last_name:
                  type: string
      responses:
        '200':
          description: Profile updated
        '401':
          description: Unauthorized

  /profile/update-picture:
    patch:
      tags: [Profile]
      summary: Update profile picture
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [profile_picture]
              properties:
                profile_picture:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile picture updated
        '401':
          description: Unauthorized

  # ─── Event ───────────────────────────────────────────────────────────────────

  /event/list:
    get:
      tags: [Event]
      summary: List events (public)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, passed]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: e_paid
          schema:
            type: boolean
        - in: query
          name: e_type
          schema:
            $ref: '#/components/schemas/EventType'
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /event/create:
    post:
      tags: [Event]
      summary: Create a new event (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description, date, location, event_paid, event_type, capacity]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 255
                description:
                  type: string
                  minLength: 10
                  maxLength: 5000
                date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
                location:
                  type: string
                event_paid:
                  type: boolean
                event_type:
                  $ref: '#/components/schemas/EventType'
                price:
                  type: number
                  minimum: 0
                capacity:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires ADMIN or ORGANIZER role

  /event/{id}/image:
    patch:
      tags: [Event]
      summary: Upload or replace event image (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image uploaded
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Event not found

  /event/{id}/update:
    put:
      tags: [Event]
      summary: Update event details (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
                location:
                  type: string
                event_type:
                  $ref: '#/components/schemas/EventType'
                event_paid:
                  type: boolean
                price:
                  type: number
                  minimum: 0
                capacity:
                  type: integer
                  minimum: 1
                image_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Event updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Event not found

  /event/{id}/register:
    post:
      tags: [Event]
      summary: Register (join) an event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Registered successfully
        '401':
          description: Unauthorized
        '404':
          description: Event not found

  /event/{id}/leave:
    post:
      tags: [Event]
      summary: Leave an event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Left event successfully
        '401':
          description: Unauthorized
        '404':
          description: Event not found

  /event/{id}/attendees:
    get:
      tags: [Event]
      summary: Get attendee list for an event (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Attendee list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Event not found

  # ─── Order ───────────────────────────────────────────────────────────────────

  /order/list:
    get:
      tags: [Order]
      summary: List orders (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: event_id
          schema:
            type: integer
        - in: query
          name: user_id
          schema:
            type: integer
      responses:
        '200':
          description: Orders retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /order/create:
    post:
      tags: [Order]
      summary: Create a new order for an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id]
              properties:
                event_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
                coupon_code:
                  type: string
                voucher_code:
                  type: string
                use_points:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Order created — payment required within 2 hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation error or not enough seats
        '401':
          description: Unauthorized
        '404':
          description: Event not found

  /order/vouchers:
    post:
      tags: [Order]
      summary: Create a voucher for an event (ADMIN or event ORGANIZER)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id, code, discount, start_date, end_date]
              properties:
                event_id:
                  type: integer
                code:
                  type: string
                discount:
                  type: number
                  description: Discount percentage (0–100)
                start_date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
                target_user_id:
                  type: integer
                  description: Restrict voucher to a specific user (optional)
      responses:
        '201':
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — not the event organizer

  /order/{id}/pay:
    post:
      tags: [Order]
      summary: Upload payment proof for an order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [payment_proof]
              properties:
                payment_proof:
                  type: string
                  format: binary
      responses:
        '200':
          description: Payment proof uploaded — awaiting admin confirmation
        '400':
          description: Invalid order status or order expired
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /order/{id}/cancel:
    post:
      tags: [Order]
      summary: Cancel an order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order canceled
        '400':
          description: Order cannot be canceled in its current status
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /order/{id}/confirm:
    post:
      tags: [Order]
      summary: Confirm order payment (ADMIN or event ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order confirmed
        '400':
          description: Order not pending confirmation
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /order/{id}/reject:
    post:
      tags: [Order]
      summary: Reject order payment (ADMIN or event ORGANIZER)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order rejected and rewards restored
        '400':
          description: Order not pending confirmation
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # ─── Review ──────────────────────────────────────────────────────────────────

  /review/event/{id}:
    get:
      tags: [Review]
      summary: Get all reviews for an event (public)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Event not found

  /review/organizer/{id}:
    get:
      tags: [Review]
      summary: Get all reviews for an organizer (public)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Organizer reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Organizer not found

  /review:
    post:
      tags: [Review]
      summary: Submit a review for an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id, rating]
              properties:
                event_id:
                  type: integer
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  # ─── Dashboard ───────────────────────────────────────────────────────────────

  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Get dashboard statistics (ADMIN or ORGANIZER)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
